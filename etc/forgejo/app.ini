APP_NAME = Forgejo
RUN_USER = git
RUN_MODE = prod
WORK_PATH = /var/lib/forgejo

[database]
DB_TYPE  = %%FORGEJO_DB_TYPE%%
HOST     = %%FORGEJO_DB_HOST%%
NAME     = %%FORGEJO_DB_NAME%%
USER     = %%FORGEJO_DB_USER%%
PASSWD   = %%FORGEJO_DB_PASSWORD%%
SSL_MODE = disable

[repository]
ROOT = /var/lib/forgejo/repositories

[server]
SSH_DOMAIN       = %%FORGEJO_DOMAIN%%
DOMAIN           = %%FORGEJO_DOMAIN%%
HTTP_PORT        = %%FORGEJO_PORT%%
ROOT_URL         = http://%%FORGEJO_DOMAIN%%:%%FORGEJO_PORT%%/
DISABLE_SSH      = false
SSH_PORT         = 22
LFS_START_SERVER = true
LFS_JWT_SECRET   = %%FORGEJO_SECRET_KEY%%

[security]
INSTALL_LOCK       = true
SECRET_KEY         = %%FORGEJO_SECRET_KEY%%
INTERNAL_TOKEN     = %%FORGEJO_SECRET_KEY%%

[service]
DISABLE_REGISTRATION              = false
REQUIRE_SIGNIN_VIEW               = false
REGISTER_EMAIL_CONFIRM            = false
ENABLE_NOTIFY_MAIL                = true
ALLOW_ONLY_EXTERNAL_REGISTRATION  = false
ENABLE_CAPTCHA                    = false
DEFAULT_KEEP_EMAIL_PRIVATE        = false

[mailer]
ENABLED   = %%FORGEJO_MAILER_ENABLED%%
PROTOCOL  = %%FORGEJO_SMTP_PROTOCOL%%
SMTP_ADDR = %%FORGEJO_SMTP_ADDR%%
SMTP_PORT = %%FORGEJO_SMTP_PORT%%
FROM      = %%FORGEJO_SMTP_FROM%%
USER      = %%FORGEJO_SMTP_USER%%
PASSWD    = %%FORGEJO_SMTP_PASSWORD%%

[log]
MODE      = file
LEVEL     = Info
ROOT_PATH = /var/lib/forgejo/log

[session]
PROVIDER = file

[picture]
DISABLE_GRAVATAR        = false
ENABLE_FEDERATED_AVATAR = true

[oauth2]
JWT_SECRET = %%FORGEJO_SECRET_KEY%%